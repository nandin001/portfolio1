<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nandin | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #f4f4f5;
            --card: #ffffff;
            --text: #18181b;
            --accent: #3b82f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }
        h1 { font-size: 1.5rem; margin: 0 0 8px 0; }
        p { line-height: 1.5; color: #52525b; }
        .links a {
            display: block;
            text-decoration: none;
            color: var(--text);
            padding: 12px;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #f8fafc;
            border-color: var(--accent);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Hi, I'm Nandin 👋</h1>
            <p>I build things for the web. Currently focused on Firebase.</p>
        </div>
    </div>
</body>
</html>
